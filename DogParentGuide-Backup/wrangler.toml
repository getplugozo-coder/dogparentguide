# ============================================================
# DogParentGuide - Cloudflare Worker Configuration
# Deploy: wrangler deploy
# ============================================================
name = "dogparentguide-sheets-proxy"
main = "worker/sheets-proxy.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Environment variables (set via wrangler secret put)
# SHEETS_API_KEY=your_google_sheets_api_key
# SHEETS_ID=your_google_spreadsheet_id

[env.production]
name = "dogparentguide-sheets-proxy"

[env.preview]
name = "dogparentguide-sheets-proxy-preview"

# Durable Objects (if needed)
# [[durable_objects.bindings]]
# name = "MY_DURABLE_OBJECT"
# class_name = "MyDurableObject"
